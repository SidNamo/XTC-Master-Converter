name: Manual Build Release

on:
  workflow_dispatch: # 수동 실행을 위한 트리거입니다.

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest] # Mac과 Windows 서버를 각각 띄웁니다.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 빌드 권한 부여

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XTC-Master-Converter-${{ matrix.os }} # OS별로 이름을 구분하여 저장합니다.
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          retention-days: 7 # 서버 자원 절약을 위해 7일간만 보관합니다.