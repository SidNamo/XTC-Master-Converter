name: Manual Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    # 모든 실행 단계의 기본 경로를 폴더 내부로 설정합니다.
    defaults:
      run:
        working-directory: ./toXtc_node 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # 캐시 파일의 정확한 경로를 지정해 줍니다.
          cache: 'npm'
          cache-dependency-path: './toXtc_node/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XTC-Master-Converter-${{ matrix.os }}
          # 빌드 결과물(dist)도 해당 폴더 안에 생성되므로 경로를 맞춰줍니다.
          path: |
            toXtc_node/dist/*.exe
            toXtc_node/dist/*.dmg
            toXtc_node/dist/*.zip
          retention-days: 7
