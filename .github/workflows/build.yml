name: Manual Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    defaults:
      run:
        working-directory: ./toXtc_node 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './toXtc_node/package-lock.json'

      - name: Install Main Dependencies
        run: npm install

      - name: Install Engine Dependencies
        # 엔진의 cli 폴더 안의 의존성을 설치합니다.
        working-directory: ./toXtc_node/epub-to-xtc-converter/cli
        run: npm install

      # 윈도우 빌드 단계
      - name: Build Application (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 맥 빌드 전용: dmg-license 설치 (윈도우 설치 에러 방지용)
      - name: Install Mac Specific Dependencies
        if: matrix.os == 'macos-latest'
        run: npm install dmg-license

      # 맥 빌드 단계
      - name: Build Application (Mac)
        if: matrix.os == 'macos-latest'
        run: npm run build-mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XTC-Master-Converter-${{ matrix.os }}
          path: |
            toXtc_node/dist/*.exe
            toXtc_node/dist/*.dmg
            toXtc_node/dist/*.zip
          retention-days: 7
